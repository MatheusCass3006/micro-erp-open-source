<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicroERP — Sem Conexão</title>
  <link rel="icon" href="/static/favicon.ico">
  <meta name="theme-color" content="#1a1a2e">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e6edf3;
      padding: 20px;
    }

    .card {
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.95); }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #e6edf3;
    }

    p {
      color: #8b949e;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #27ae60, #1e6b2e);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      margin: 6px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(39,174,96,0.35);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      color: #8b949e;
    }

    .btn-outline:hover {
      border-color: rgba(255,255,255,0.4);
      color: #e6edf3;
      box-shadow: none;
    }

    .status {
      margin-top: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }

    .status.online {
      background: rgba(39, 174, 96, 0.15);
      border: 1px solid rgba(39, 174, 96, 0.3);
      color: #27ae60;
      display: block;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #27ae60, #1e6b2e);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 24px;
      font-weight: 900;
      color: white;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1    { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">M</div>

    <div class="icon">📡</div>

    <h1>Sem conexão com a internet</h1>
    <p>
      O MicroERP precisa de conexão para acessar seus dados financeiros.
      Verifique sua internet e tente novamente.
    </p>

    <div>
      <button class="btn" onclick="tentarReconectar()">
        🔄 Tentar novamente
      </button>
      <a href="index.html" class="btn btn-outline">
        🏠 Início
      </a>
    </div>

    <div id="statusMsg" class="status"></div>
  </div>

  <script>
    // Verificar conexão ao carregar
    function verificarConexao() {
      return navigator.onLine;
    }

    async function tentarReconectar() {
      const btn = document.querySelector('.btn');
      btn.textContent = '⏳ Verificando...';
      btn.disabled = true;

      // Verifica conexão via navigator.onLine (standalone, sem backend)
      await new Promise(r => setTimeout(r, 800));

      if (navigator.onLine) {
        mostrarStatus('✅ Conexão restaurada! Redirecionando...', 'online');
        setTimeout(() => window.location.href = 'index.html', 1500);
      } else {
        mostrarStatus('❌ Ainda sem conexão. Tente novamente em instantes.', '');
        btn.textContent = '🔄 Tentar novamente';
        btn.disabled = false;
      }
    }

    function mostrarStatus(msg, cls) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status ' + cls;
    }

    // Escutar eventos de rede
    window.addEventListener('online', () => {
      mostrarStatus('✅ Conexão detectada! Redirecionando...', 'online');
      setTimeout(() => window.location.href = 'index.html', 1500);
    });

    window.addEventListener('offline', () => {
      mostrarStatus('❌ Conexão perdida.', '');
    });
  </script>

</body>
</html>
