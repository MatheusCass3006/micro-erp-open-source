# ============================================================
# NGINX — MicroERP (AWS EC2)
# IP: 56.124.56.111
#
# Copiar para: /etc/nginx/sites-available/microerp
# Ativar com:  sudo ln -s /etc/nginx/sites-available/microerp /etc/nginx/sites-enabled/
# Testar:      sudo nginx -t
# Recarregar:  sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name 56.124.56.111 _;

    # Logs
    access_log /var/log/nginx/microerp-access.log;
    error_log  /var/log/nginx/microerp-error.log;

    # Tamanho máximo de upload (para OCR de boletos/NFs)
    client_max_body_size 10M;

    # ── API: /api/* → Backend Node.js (porta 3001) ────────────
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeout generoso para operações longas (OCR, relatórios)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # ── Frontend: tudo o mais → Next.js (porta 3000) ──────────
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    # Cache de assets estáticos do Next.js
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ============================================================
# QUANDO TIVER DOMÍNIO: adicionar bloco redirect HTTP→HTTPS
# e configurar SSL com: sudo certbot --nginx -d seudominio.com
# ============================================================
